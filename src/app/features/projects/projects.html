<main class="grain-overlay mesh-gradient">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <section class="py-[80px] md:py-[160px] px-6 md:px-[64px] pb-[20px] md:pb-[80px]">
    <div class="w-full mx-auto max-w-[1280px] flex flex-col">
      <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-8">
        <div class="max-w-2xl">
          <p class="text-sm font-semibold text-primary uppercase tracking-widest mb-4">
            Ingeniería en ciencias de la computación
          </p>
          <h2 class="text-[48px] font-title text-on-surface">Projectos realizados:</h2>
        </div>
        <a href="https://github.com/Carofort" target="_blank" rel="noopener noreferrer">
          <button
            class="text-on-surface hover:text-primary transition-colors flex items-center gap-2 text-sm font-semibold uppercase tracking-widest pb-2 border-b border-on-surface/20"
          >
            Perfil de GitHub
          </button>
        </a>
      </div>
      <div class="grid grid-cols-1 gap-10">
        <!-- PROYECTO DESTACADO -->
        <div class="grid grid-cols-1 gap-10">
          @for (project of projects; track project.id) {
            <div
              class="glass flex flex-col md:flex-row overflow-hidden rounded-xl border border-outline-variant/30 hover:-translate-y-2 transition-all duration-500 shadow-xl shadow-tertiary/5"
            >
              @if (project.imagen) {
                <div class="md:w-1/3 h-80 md:h-auto overflow-hidden">
                  <img
                    [src]="'https://delicate-presence-af112459c7.strapiapp.com' + project.imagen.url"
                    [alt]="project.titulo"
                    class="w-full h-full object-cover"
                  />
                </div>
              }

              <div class="flex-1 p-10 flex flex-col">
                <h3 class="font-title text-[30px] font-medium mb-3">
                  {{ project.titulo }}
                </h3>

                <div class="flex flex-wrap gap-2 mb-6">
                  @for (tech of project.tecnologia.split(','); track tech) {
                    <span
                      class="px-3 py-1 rounded-full text-xs font-medium bg-primary/10 text-primary"
                    >
                      {{ tech.trim() }}
                    </span>
                  }
                </div>

                <p class="text-base text-on-surface-variant mb-8 leading-relaxed flex-grow">
                  {{ project.descripcion }}
                </p>

                <div class="flex gap-4 justify-center">
                  <a
                    [href]="project.repositorio"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="bg-primary text-on-primary py-3 px-6 rounded-full text-sm font-semibold btn-hover-effect uppercase tracking-widest"
                  >
                    Ver repositorio
                  </a>
                </div>
              </div>
            </div>
          }
        </div>
      </div>
    </div>
    <div class="flex justify-center mt-16">
      <button
        (click)="scrollToTop()"
        class="text-on-surface hover:text-primary transition-colors flex items-center gap-2 text-sm font-semibold uppercase tracking-widest pb-2 border-b border-on-surface/20"
      >
        Volver arriba ↑
      </button>
    </div>
  </section>
</main>
